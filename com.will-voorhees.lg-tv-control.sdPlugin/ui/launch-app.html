<!DOCTYPE html>
<html>

<head lang="en">
    <title>Launch App</title>
    <meta charset="utf-8" />
    <script src="sdpi-components.js"></script>
</head>

<body>
    <sdpi-item label="TV">
        <sdpi-select id="tv-picker">
        </sdpi-select>
    </sdpi-item>

    <sdpi-item label="App">
        <button id="fetch-btn" class="pi-btn">Fetch Apps from TV</button>
    </sdpi-item>

    <sdpi-item label="Select" id="app-select-item" style="display: none">
        <sdpi-select id="app-select">
            <option value="">Select an app...</option>
        </sdpi-select>
    </sdpi-item>

    <p id="app-status" class="pi-status"></p>

    <div id="tv-selector-root"></div>

    <script>
        const sd = SDPIComponents.streamDeckClient;

        let currentSettings = {};
        let appLabelMap = {};

        sd.didReceiveSettings.subscribe(({ payload }) => {
            currentSettings = { ...payload.settings };
            const { appId, appLabel } = currentSettings;
            if (appId) {
                const select = document.getElementById('app-select');
                select.innerHTML = `<option value="${appId}">${appLabel ?? appId}</option>`;
                document.getElementById('app-select-item').style.display = '';
            }
        });

        const tvPicker = document.getElementById('tv-picker');
        tvPicker.addEventListener('valuechange', () => {
            const tvId = tvPicker.value || undefined;
            currentSettings = { ...currentSettings, tvId };
            sd.setSettings(currentSettings);
        });

        document.getElementById('fetch-btn').addEventListener('click', () => {
            document.getElementById('app-status').textContent = 'Fetching apps...';
            sd.send('sendToPlugin', { event: 'getAppList', tvId: currentSettings.tvId });
        });

        const appSelect = document.getElementById('app-select');
        appSelect.addEventListener('valuechange', () => {
            const appId = appSelect.value;
            const appLabel = appLabelMap[appId] ?? appId;
            if (appId) {
                currentSettings = { ...currentSettings, appId, appLabel };
                sd.setSettings(currentSettings);
            }
        });

        sd.sendToPropertyInspector.subscribe(({ payload }) => {
            if (payload.event === 'tvList') {
                tvPicker.innerHTML = '';
                (payload.tvs ?? []).forEach(tv => {
                    const opt = document.createElement('option');
                    opt.value = tv.id;
                    opt.textContent = tv.name;
                    if (tv.id === currentSettings.tvId) opt.selected = true;
                    tvPicker.appendChild(opt);
                });
                return;
            }

            if (payload.event !== 'appList') return;

            const select = document.getElementById('app-select');
            const status = document.getElementById('app-status');

            select.innerHTML = '<option value="">Select an app...</option>';
            appLabelMap = {};

            if (payload.error === 'not_connected') {
                status.textContent = 'Not connected to TV.';
                return;
            }

            if (!payload.apps || payload.apps.length === 0) {
                status.textContent = 'No apps found.';
                return;
            }

            payload.apps.forEach(app => {
                const option = document.createElement('option');
                option.value = app.id;
                option.textContent = app.label ?? app.id;
                appLabelMap[app.id] = app.label ?? app.id;
                select.appendChild(option);
            });

            document.getElementById('app-select-item').style.display = '';
            status.textContent = `Found ${payload.apps.length} app(s).`;
        });
    </script>

    <script src="tv-selector.js"></script>
</body>

</html>
