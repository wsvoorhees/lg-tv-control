<!DOCTYPE html>
<html>

<head lang="en">
    <title>Set Input</title>
    <meta charset="utf-8" />
    <script src="sdpi-components.js"></script>
</head>

<body>
    <sdpi-item label="TV">
        <sdpi-select id="tv-picker">
            <option value="">Default TV</option>
        </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Input">
        <button id="fetch-btn" class="pi-btn">Fetch Inputs from TV</button>
    </sdpi-item>

    <sdpi-item label="Select" id="input-select-item" style="display: none">
        <sdpi-select id="input-select">
            <option value="">Select an input...</option>
        </sdpi-select>
    </sdpi-item>

    <p id="input-status" class="pi-status"></p>

    <div id="tv-selector-root"></div>

    <script>
        const sd = SDPIComponents.streamDeckClient;

        let currentSettings = {};
        let inputLabelMap = {};

        sd.didReceiveSettings.subscribe(({ payload }) => {
            currentSettings = { ...payload.settings };
            const { inputId, inputLabel } = currentSettings;
            if (inputId) {
                const select = document.getElementById('input-select');
                select.innerHTML = `<option value="${inputId}">${inputLabel ?? inputId}</option>`;
                document.getElementById('input-select-item').style.display = '';
            }
        });

        const tvPicker = document.getElementById('tv-picker');
        tvPicker.addEventListener('valuechange', () => {
            const tvId = tvPicker.value || undefined;
            currentSettings = { ...currentSettings, tvId };
            sd.setSettings(currentSettings);
        });

        document.getElementById('fetch-btn').addEventListener('click', () => {
            document.getElementById('input-status').textContent = 'Fetching inputs...';
            sd.send('sendToPlugin', { event: 'getInputList', tvId: currentSettings.tvId });
        });

        const inputSelect = document.getElementById('input-select');
        inputSelect.addEventListener('valuechange', () => {
            const inputId = inputSelect.value;
            const inputLabel = inputLabelMap[inputId] ?? inputId;
            if (inputId) {
                currentSettings = { ...currentSettings, inputId, inputLabel };
                sd.setSettings(currentSettings);
            }
        });

        sd.sendToPropertyInspector.subscribe(({ payload }) => {
            if (payload.event === 'tvList') {
                tvPicker.innerHTML = '<option value="">Default TV</option>';
                (payload.tvs ?? []).forEach(tv => {
                    const opt = document.createElement('option');
                    opt.value = tv.id;
                    opt.textContent = tv.name;
                    if (tv.id === currentSettings.tvId) opt.selected = true;
                    tvPicker.appendChild(opt);
                });
                return;
            }

            if (payload.event !== 'inputList') return;

            const select = document.getElementById('input-select');
            const status = document.getElementById('input-status');

            select.innerHTML = '<option value="">Select an input...</option>';
            inputLabelMap = {};

            if (payload.error === 'not_connected') {
                status.textContent = 'Not connected to TV.';
                return;
            }

            if (!payload.inputs || payload.inputs.length === 0) {
                status.textContent = 'No inputs found.';
                return;
            }

            payload.inputs.forEach(input => {
                const option = document.createElement('option');
                option.value = input.id;
                option.textContent = input.label ?? input.id;
                inputLabelMap[input.id] = input.label ?? input.id;
                select.appendChild(option);
            });

            document.getElementById('input-select-item').style.display = '';
            status.textContent = `Found ${payload.inputs.length} input(s).`;
        });
    </script>

    <script src="tv-selector.js"></script>
</body>

</html>
